name: Full Stack Docker CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  # --- JOB 1: BACKEND ---
  build-backend:
    name: Build & Push Backend
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_HUB_USERNAME }}
          password: ${{ secrets.DOCKER_HUB_ACCESS_TOKEN }}

      - name: Build and Push Backend Image
        uses: docker/build-push-action@v5
        with:
          context: ./calculator-backend # Points to your Java folder
          push: true
          tags: |
            ${{ secrets.DOCKER_HUB_USERNAME }}/calc-backend:latest
            ${{ secrets.DOCKER_HUB_USERNAME }}/calc-backend:${{ github.sha }}

  # --- JOB 2: FRONTEND ---
  build-frontend:
    name: Build & Push Frontend
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_HUB_USERNAME }}
          password: ${{ secrets.DOCKER_HUB_ACCESS_TOKEN }}

      - name: Build and Push Frontend Image
        uses: docker/build-push-action@v5
        with:
          context: ./calculator-frontend # Points to your React folder
          push: true
          tags: |
            ${{ secrets.DOCKER_HUB_USERNAME }}/calc-frontend:latest
            ${{ secrets.DOCKER_HUB_USERNAME }}/calc-frontend:${{ github.sha }}
